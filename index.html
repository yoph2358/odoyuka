<body class="">
	<main>
		<section class="about" id="about">
			<h2 class="wave-text">プロフィール</h2>
		</section>


		<section class="fortuneForm" id="fortuneForm">
			<h2 class="wave-text">さっそく占ってみる</h2>
			<form id="numerology">
				<div class="formBirth">
					<label>生年月日</label><br>
					<input type="number" value="1990" min="1900" max="2100" id="year" class="formBirth_num"
						placeholder="1990" required> <span>年</span><br>
					<input type="number" value="1" min="1" max="12" id="month" class="formBirth_mon" placeholder="1"
						required>
					<span>月</span><br>
					<input type="number" value="1" min="1" max="31" id="day" class="formBirth_day" placeholder="1"
						required>
					<span>日</span>
				</div>

				<!--<div>
			<label>名前（ローマ字）</label><br>
			<input type="text" id="name" placeholder="MASAKO" required>
			</div>-->

				<button class="formBirth_submit" type="submit">GO</button>
			</form>

			<div class="result_area">
				<div id="result" class="formBirth_result"></div>
			</div>
		</section>



	</main>
